<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0e0c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1916;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="#E8340A"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="#2a2926" stroke-width="1"/>
  <line x1="0" y1="314" x2="1200" y2="314" stroke="#2a2926" stroke-width="1"/>
  <line x1="0" y1="471" x2="1200" y2="471" stroke="#2a2926" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#2a2926" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#2a2926" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#2a2926" stroke-width="1"/>

  <!-- Trending-down arrow icon -->
  <g transform="translate(76, 68)">
    <rect width="56" height="56" rx="12" fill="#E8340A" opacity="0.15"/>
    <polyline points="10,18 28,36 46,18" fill="none" stroke="#E8340A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="28" y1="36" x2="28" y2="46" stroke="#E8340A" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Eyebrow -->
  <text x="76" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500"
        letter-spacing="0.12em" fill="#E8340A" text-anchor="start">LAYOFFSTRACKER.PAGES.DEV</text>

  <!-- Main headline -->
  <text x="76" y="270" font-family="Georgia, serif" font-size="88" font-weight="700"
        fill="#F7F6F3" text-anchor="start" letter-spacing="-2">1,036,078</text>
  <text x="76" y="340" font-family="Georgia, serif" font-size="44" font-weight="400"
        fill="#9E9C96" text-anchor="start">jobs lost — and counting</text>

  <!-- Stats row -->
  <g transform="translate(76, 410)">
    <!-- Stat 1 -->
    <text x="0" y="0" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#F7F6F3">1,926</text>
    <text x="0" y="28" font-family="system-ui, sans-serif" font-size="14" fill="#6B6860" letter-spacing="0.05em">COMPANIES TRACKED</text>
    <!-- Divider -->
    <line x1="180" y1="-8" x2="180" y2="36" stroke="#2a2926" stroke-width="1.5"/>
    <!-- Stat 2 -->
    <text x="200" y="0" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#F7F6F3">2025</text>
    <text x="200" y="28" font-family="system-ui, sans-serif" font-size="14" fill="#6B6860" letter-spacing="0.05em">INCLUDING FEDERAL DOGE</text>
    <!-- Divider -->
    <line x1="440" y1="-8" x2="440" y2="36" stroke="#2a2926" stroke-width="1.5"/>
    <!-- Stat 3 -->
    <text x="460" y="0" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#E8340A">Free</text>
    <text x="460" y="28" font-family="system-ui, sans-serif" font-size="14" fill="#6B6860" letter-spacing="0.05em">NO LOGIN REQUIRED</text>
  </g>

  <!-- CTA pill -->
  <rect x="76" y="516" width="280" height="52" rx="26" fill="#E8340A"/>
  <text x="216" y="548" font-family="system-ui, sans-serif" font-size="17" font-weight="600"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="0.02em">Explore the Data →</text>
</svg>