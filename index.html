          "@type": "WebSite",
          "@id": "https://data-insider-nyc.github.io/layoffstracker/#website",

            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://data-insider-nyc.github.io/layoffstracker/company/{search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Dataset",
          "@id": "https://data-insider-nyc.github.io/layoffstracker/#dataset",

          "creator": {
            "@type": "Person",
            "name": "Karl Kwon"
          },
          "temporalCoverage": "2020/..",
          "spatialCoverage": "United States",
          "keywords": ["layoffs", "tech layoffs", "job cuts", "employment data", "corporate downsizing"],
          "license": "https://creativecommons.org/licenses/by/4.0/",
          "isAccessibleForFree": true,
          "inLanguage": "en-US"
        },
        {
          "@type": "WebApplication",
          "@id": "https://data-insider-nyc.github.io/layoffstracker/#app",

          "url": "https://data-insider-nyc.github.io/layoffstracker/",
          "applicationCategory": "DataVisualization",
          "operatingSystem": "Web",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          }
        }
      ]
    }
